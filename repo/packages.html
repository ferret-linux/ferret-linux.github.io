<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferret Linux — Repositories</title>
<link rel="icon" href="../assets/ferret-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="packages.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="container navbar__inner">
    <a href="../index.html" class="navbar__brand">
      <img src="../assets/ferret-icon.png" alt="Ferret Linux" class="navbar__logo">
      <span class="navbar__wordmark">Ferret <span>Repos</span></span>
    </a>
    <div class="navbar__tag">DWG NO. 005 · REV <span>A</span></div>
  </div>
</nav>

<!-- HEADER -->
<section class="section">
  <div class="container">
    <div class="section__label">Fig. 06 — Repositories</div>
    <h2 class="section__title">Browse the repos.</h2>
    <p class="section__subtitle">Live package and kernel module listings, pulled directly from the Ferret repodata. Search, sort, and grab the .rpm you need.</p>

    <div class="controls">
      <input type="text" id="search-input" placeholder="Search packages...">
      <select id="repo-select">
        <option value="pkgs">Packages</option>
        <option value="kmods">Kernel modules</option>
      </select>
      <select id="sort-select">
        <option value="name">Sort by Name</option>
        <option value="size">Sort by Size</option>
        <option value="version">Sort by Version</option>
      </select>
    </div>

    <div class="repo-stats">
      <span id="stat-repo">ferret-pkgs</span>
      <span class="sep">•</span>
      <span id="stat-total">0</span> packages
      <span class="sep">•</span>
      Last updated: <span id="stat-updated">—</span>
    </div>

    <div class="pkg-list" id="pkg-list">
      <div class="state-box">
        <div class="spinner"></div>
        <span>Initializing...</span>
      </div>
    </div>
  </div>
</section>

<script src="packages.js"></script>
</body>
</html>
